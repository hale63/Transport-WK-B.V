<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fastway Navbar</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.3/cdn.min.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Additional custom styling for enhanced glass effect and stability */
    .glass-nav {
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
    }

    /* for older browsers, a solid dark fallback */
    @supports not (backdrop-filter: blur(12px)) {
      .glass-nav {
        background: rgba(0, 0, 0, 0.85);
      }
    }

    /* Smooth hover transitions */
    .nav-link {
      transition: color 0.2s ease, background 0.2s ease;
    }

    /* hamburger animation lines */
    .hamburger-active #line1 {
      transform: translateY(6px) rotate(45deg);
    }

    .hamburger-active #line2 {
      opacity: 0;
    }

    .hamburger-active #line3 {
      transform: translateY(-6px) rotate(-45deg);
    }

    /* prevent body scroll when mobile menu open? optional but adds quality */
    .menu-open {
      overflow: hidden;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-60px);
      }
    }

    .animate-float {
      animation: float 4s ease-in-out infinite;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0d1b2a',
            'navy-light': '#162233',
            accent: '#f97316',
          },
          fontFamily: {
            heading: ['"Barlow Condensed"', 'sans-serif'],
            body: ['"Barlow"', 'sans-serif'],
          }
        }
      }
    }

  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    [x-cloak] {
      display: none !important;
    }

    .dropdown:hover .dropdown-menu {
      display: block;
    }

    .nav-link {
      position: relative;
      letter-spacing: 0.08em;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: #f97316;
      transition: width 0.25s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .dropdown-menu {
      display: none;
      animation: fadeDown 0.18s ease;
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
